name: Android CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Clone Gauge Library
        run: |
          echo "Cloning external gauge library..."
          git clone --depth 1 --branch Signalo https://github.com/Magnus987/better-gauge-android.git

          echo "Copy gaugelibrary into project root..."
          cp -r better-gauge-android/gaugelibrary ./gaugelibrary

          echo "Cleanup..."
          rm -rf better-gauge-android

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug
